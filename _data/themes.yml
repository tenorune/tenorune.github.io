- slug: bureaucratic-cruelty
  label: bureaucratic cruelty
  description: "Harm inflicted at scale through systems, paperwork, and institutional indifference."
- slug: civilian-harm
  label: civilian harm
  description: "Non-combatants caught in or targeted by state-organized force."
- slug: deportation-machinery
  label: deportation machinery
  description: "The apparatus of removal — its scale, its logic, its asymmetric efficiency."
- slug: rule-of-law
  label: rule of law
  description: "Legal and constitutional norms tested by the conduct of state power."
- slug: state-violence
  label: state violence
  description: "Governmental coercion exercised against persons, lawfully or not."
- slug: official-narrative
  label: official narrative
  description: "The gap between official accounts and what evidence shows — propaganda, denial, and the deployment and unraveling of state-issued fictions."
- slug: predatory-capital
  label: predatory capital
  description: "Where private wealth is built on the apparatus — shareholders, executive compensation, defense contractors, family business interests."
- slug: resistance-and-witness
  label: resistance and witness
  description: "Who refuses, documents, or intervenes — whistleblowers, journalists, judges, neighbors, the planned testimony."
