<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OAuth callback</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 38rem;
    margin: 2rem auto;
    padding: 1rem;
    color: #1a1a1a;
    background: #fafaf8;
    line-height: 1.55;
  }
  h1 { font-size: 1.4rem; }
  code, pre {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.85rem;
  }
  pre {
    background: #f0eee8;
    padding: 0.75rem;
    border-radius: 4px;
    overflow-x: auto;
    word-break: break-all;
    white-space: pre-wrap;
  }

<body>
<h1>OAuth callback received</h1>
<p>Copy the full URL of this page and paste it back into your terminal to complete authentication.</p>
<p class="note">This page is part of the atproto-oauth-py one-time OAuth flow. It does not store any data.</p>
<pre id="url"></pre>
<script>
  document.getElementById('url').textContent = window.location.href;
</script>
