name: curate

on:
  issues:
    types: [opened, reopened, edited]

permissions:
  contents: write
  issues: write

jobs:
  curate:
    runs-on: ubuntu-latest
    if: "${{ startsWith(github.event.issue.title, 'curator: ') }}"
    steps:
      - name: Parse issue title
        id: parse
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          # Match: "curator: <action> <target>"
          if [[ "$TITLE" =~ ^curator:\ (publish|draft|reject|skip|queue|unqueue)\ ([a-z0-9-]+)$ ]]; then
            echo "action=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "target=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "ok=true"                   >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject malformed title
        if: steps.parse.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Title does not match \`curator: (publish|draft|reject|skip|queue|unqueue) <slug-or-rkey>\`. Closing."
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}

      - name: Gate on owner
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association != 'OWNER'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Curator actions are restricted to the repository owner. Closing."
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}

      - uses: actions/checkout@v5
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        run: pip install pyyaml

      - name: Append to curator queue and push (with retry on race)
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        env:
          ACTION: ${{ steps.parse.outputs.action }}
          TARGET: ${{ steps.parse.outputs.target }}
          ISSUE:  ${{ github.event.issue.number }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          append() {
            python -c "
import yaml, os
from datetime import datetime, timezone
from pathlib import Path
qpath = Path('_data/curator_queue.yml')
queue = yaml.safe_load(qpath.read_text(encoding='utf-8')) if qpath.exists() else []
queue = queue or []
queue.append({
    'action': os.environ['ACTION'],
    'target': os.environ['TARGET'],
    'issue':  int(os.environ['ISSUE']),
    'submitted_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
})
qpath.write_text(yaml.safe_dump(queue, sort_keys=False, allow_unicode=True), encoding='utf-8')
"
            git add _data/curator_queue.yml
          }

          append
          if git diff --cached --quiet; then
            echo "no change to queue (already enqueued?)"
            exit 0
          fi
          git commit -m "queue: $ACTION $TARGET (issue #$ISSUE)"

          # Retry on non-fast-forward push (concurrent enqueues racing on main).
          for attempt in $(seq 1 30); do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push #$attempt rejected; rebasing on origin/main and re-appending"
            git fetch origin main
            git reset --hard origin/main
            append
            if git diff --cached --quiet; then
              echo "no change after rebase"
              exit 0
            fi
            git commit -m "queue: $ACTION $TARGET (issue #$ISSUE)"
            sleep $(( attempt < 5 ? attempt : 5 ))
          done
          echo "exhausted push retries"
          exit 1

      - name: Acknowledge on issue
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read current queue length for the comment.
          QSIZE=$(python -c "
import yaml
from pathlib import Path
q = yaml.safe_load(Path('_data/curator_queue.yml').read_text()) or []
print(len(q))
")
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Queued for next drain (curator queue: $QSIZE pending). The drain workflow can be triggered from the Actions tab, or in chat with Claude."
