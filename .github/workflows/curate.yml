name: curate

on:
  issues:
    types: [opened, reopened, edited]

permissions:
  contents: write
  issues: write

jobs:
  curate:
    runs-on: ubuntu-latest
    if: "${{ startsWith(github.event.issue.title, 'curator: ') }}"
    steps:
      - name: Parse issue title
        id: parse
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          # Match: "curator: <action> <target>"
          # action ∈ {publish, draft, reject, skip, queue, unqueue}
          # target = story slug (kebab) or rkey (alphanumeric); both fit [a-z0-9-]+
          if [[ "$TITLE" =~ ^curator:\ (publish|draft|reject|skip|queue|unqueue)\ ([a-z0-9-]+)$ ]]; then
            echo "action=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "target=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "ok=true"                   >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject malformed title
        if: steps.parse.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Title does not match \`curator: (publish|draft|reject|skip|queue|unqueue) <slug-or-rkey>\`. Closing."
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}

      - name: Gate on owner
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association != 'OWNER'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Curator actions are restricted to the repository owner. Closing."
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}

      - uses: actions/checkout@v5
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        run: pip install pyyaml

      - name: Apply, commit, and push (with retry on race)
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        env:
          ACTION: ${{ steps.parse.outputs.action }}
          TARGET: ${{ steps.parse.outputs.target }}
          ISSUE:  ${{ github.event.issue.number }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          apply_and_stage() {
            python scripts/curate.py "$ACTION" "$TARGET"
            python scripts/build_curator_data.py
            python scripts/build_pending_data.py
            git add _stories/ _data/curator.yml _data/pending.yml _data/saves_state.json
          }

          # First attempt: apply, commit, push.
          apply_and_stage
          if git diff --cached --quiet; then
            echo "noop=true" >> "$GITHUB_ENV"
            exit 0
          fi
          git commit -m "curate: $ACTION $TARGET (issue #$ISSUE)"

          # Retry on non-fast-forward push (concurrent curate runs racing
          # on main). Keep going for up to ~30 attempts; sleep grows from
          # 1s to a cap of 5s so a burst of 10+ parallel issues all land
          # eventually without any single retry waiting too long.
          for attempt in $(seq 1 30); do
            if git push origin HEAD:main; then
              echo "noop=false" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "push #$attempt rejected; rebasing on origin/main and re-applying"
            git fetch origin main
            git reset --hard origin/main
            apply_and_stage
            if git diff --cached --quiet; then
              echo "no changes after rebase — already in target state on latest main"
              echo "noop=true" >> "$GITHUB_ENV"
              exit 0
            fi
            git commit -m "curate: $ACTION $TARGET (issue #$ISSUE)"
            # Sleep: 1, 2, 3, 4, 5, then capped at 5s for the rest.
            sleep $(( attempt < 5 ? attempt : 5 ))
          done

          echo "exhausted push retries"
          exit 1

      - name: Confirm and close
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$noop" = "true" ]; then
            BODY="No-op: \`${{ steps.parse.outputs.target }}\` was already in the requested state (\`${{ steps.parse.outputs.action }}\`)."
          else
            BODY="Applied \`${{ steps.parse.outputs.action }}\` to \`${{ steps.parse.outputs.target }}\`."
          fi
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "$BODY"
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
