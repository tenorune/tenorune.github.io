name: curate

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  curate:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'curator: ')
    steps:
      - name: Parse issue title
        id: parse
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          # Match: "curator: <action> <slug>"
          if [[ "$TITLE" =~ ^curator:\ (publish|draft|reject)\ ([a-z0-9-]+)$ ]]; then
            echo "action=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "slug=${BASH_REMATCH[2]}"   >> "$GITHUB_OUTPUT"
            echo "ok=true"                   >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject malformed title
        if: steps.parse.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Title does not match \`curator: (publish|draft|reject) <slug>\`. Closing."
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}

      - name: Gate on owner
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association != 'OWNER'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Curator actions are restricted to the repository owner. Closing."
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}

      - uses: actions/checkout@v5
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        run: pip install pyyaml

      - name: Apply curator action
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        run: |
          python scripts/curate.py "${{ steps.parse.outputs.action }}" "${{ steps.parse.outputs.slug }}"
          python scripts/build_curator_data.py

      - name: Commit and push
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _stories/ _data/curator.yml
          if git diff --cached --quiet; then
            echo "no changes — action was a no-op"
            echo "noop=true" >> "$GITHUB_ENV"
          else
            git commit -m "curate: ${{ steps.parse.outputs.action }} ${{ steps.parse.outputs.slug }} (issue #${{ github.event.issue.number }})"
            git push origin HEAD:main
            echo "noop=false" >> "$GITHUB_ENV"
          fi

      - name: Confirm and close
        if: steps.parse.outputs.ok == 'true' && github.event.issue.author_association == 'OWNER'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$noop" = "true" ]; then
            BODY="No-op: \`${{ steps.parse.outputs.slug }}\` was already in the requested state (\`${{ steps.parse.outputs.action }}\`)."
          else
            BODY="Applied \`${{ steps.parse.outputs.action }}\` to \`${{ steps.parse.outputs.slug }}\`."
          fi
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "$BODY"
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
