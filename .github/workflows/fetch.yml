name: fetch saves

on:
  # workflow_dispatch only. Cron is disabled because the curator drives
  # ingestion manually from the Actions tab; daily-cron noise wasn't
  # buying anything.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch saves
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          # PDS override; defaults to https://bsky.social if unset. Required
          # for accounts hosted on a third-party PDS (e.g., eurosky.social).
          BSKY_PDS: ${{ vars.BSKY_PDS || 'https://bsky.social' }}
        run: bsky-saves fetch --inventory _data/saves_inventory.json

      - name: Commit if changed
        run: |
          git config user.name "fetch-saves[bot]"
          git config user.email "fetch-saves@users.noreply.github.com"
          # bsky-saves v0.2.2+ leaves the inventory file byte-identical
          # on no-op runs (no fetched_at churn), so a clean diff is a
          # real "nothing to do" signal.
          if git diff --quiet -- _data/saves_inventory.json; then
            echo "no changes to inventory"
            exit 0
          fi
          git add _data/saves_inventory.json
          git commit -m "data: refresh saves inventory"
          git push
