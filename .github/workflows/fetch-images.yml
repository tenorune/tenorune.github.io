name: fetch images

# Three-step orchestrator (since bsky-saves v0.2):
#   1. Build a uris.txt of every _stories/*.md's bluesky_uri.
#   2. Run `bsky-saves hydrate images` to download CDN images into a flat
#      cache and record each entry's local_images map in the inventory.
#   3. Run scripts/localize_story_images.py to copy cached images into
#      per-slug assets/stories/<slug>/ subdirs and rewrite Markdown
#      references in _stories/*.md.
#
# The transform-into-Jekyll-layout step (3) used to live inside the
# bsky-saves package; v0.2 cuts that out (the package is now ingestion-
# only) and stories-of-47 owns it. See:
#   docs/extraction-draft/README.md (overall extraction context)
#   bsky-saves spec docs/superpowers/specs/2026-05-01-bsky-saves-v0.2-images-scope-cut.md

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Persist _data/_image_cache/ across runs. The cache directory is
      # gitignored (it's an intermediate artifact between bsky-saves'
      # download and the rewriter's slug-scoped copy), so without this
      # every fresh CI checkout would re-download every image. With it,
      # bsky-saves' "skip if file exists on disk" idempotence kicks in
      # and only genuinely-new images are fetched.
      #
      # Unique key per run + restore-keys fallback ensures every run
      # uploads a fresh keyed cache covering whatever it touched, while
      # restoring from the most recent prior cache. Cache size is small
      # (~10s of MB) and grows monotonically as new bookmarks come in.
      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: _data/_image_cache
          key: bsky-saves-image-cache-${{ github.run_id }}
          restore-keys: |
            bsky-saves-image-cache-

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Build URI subset from _stories/*.md
        run: |
          # Collect every story's bluesky_uri into a flat newline-delimited
          # file. Stories without a bluesky_uri (e.g. authored from
          # scratch) are silently omitted.
          python - <<'PY'
          import re
          from pathlib import Path
          uri_re = re.compile(r'^bluesky_uri:\s*"?(at://[^"\s]+)"?\s*$', re.M)
          uris = []
          for md in sorted(Path("_stories").glob("*.md")):
              m = uri_re.search(md.read_text(encoding="utf-8"))
              if m:
                  uris.append(m.group(1))
          Path("uris.txt").write_text("\n".join(uris) + "\n", encoding="utf-8")
          print(f"collected {len(uris)} URIs")
          PY

      - name: Hydrate images into flat cache
        run: |
          bsky-saves hydrate images \
            --inventory _data/saves_inventory.json \
            --out _data/_image_cache \
            --uris uris.txt

      - name: Localize cached images into assets/stories/<slug>/
        run: python scripts/localize_story_images.py

      - name: Commit if any change
        run: |
          git config user.name "fetch-images[bot]"
          git config user.email "fetch-images@users.noreply.github.com"
          # bsky-saves v0.2.1+ only writes the inventory when something
          # actually changed (fixed in upstream from v0.2.0's always-
          # rewrite behavior), so the staged diff being empty is a true
          # no-op signal — no fetched_at-only churn to revert.
          git add _stories/ assets/stories/ _data/saves_inventory.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: hydrate images (cache, inventory, and assets)"
          git push
