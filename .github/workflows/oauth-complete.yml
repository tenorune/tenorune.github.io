name: oauth complete

on:
  workflow_dispatch:
    inputs:
      init_run_id:
        description: "Run ID of the 'oauth init' workflow that produced the state artifact"
        required: true
        type: string
      redirect_url:
        description: "The full URL displayed on lightseed.net/oauth/callback/ after authorising"
        required: true
        type: string

jobs:
  complete:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Download state artifact from oauth-init run
        uses: actions/download-artifact@v4
        with:
          name: oauth-init-state
          path: .
          run-id: ${{ inputs.init_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run OAuth complete phase
        run: python scripts/oauth_init.py complete '${{ inputs.redirect_url }}'
