name: fetch articles

on:
  workflow_dispatch:
    inputs:
      refresh_dates:
        description: "Re-fetch already-hydrated articles to capture article_published_at"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Hydrate inventory with article text
        run: |
          if [ "${{ inputs.refresh_dates }}" = "true" ]; then
            python scripts/fetch_articles.py --refresh-dates
          else
            python scripts/fetch_articles.py
          fi

      - name: Commit if inventory changed
        run: |
          git config user.name "fetch-articles[bot]"
          git config user.email "fetch-articles@users.noreply.github.com"
          if git diff --quiet -- _data/saves_inventory.json; then
            echo "no changes to inventory"
            exit 0
          fi
          git add _data/saves_inventory.json
          git commit -m "data: hydrate articles into inventory"
          git push
