name: fetch threads

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Hydrate inventory with thread_replies
        run: bsky-saves hydrate threads --inventory _data/saves_inventory.json

      - name: Commit if inventory changed
        run: |
          git config user.name "fetch-threads[bot]"
          git config user.email "fetch-threads@users.noreply.github.com"
          if git diff --quiet -- _data/saves_inventory.json; then
            echo "no changes to inventory"
            exit 0
          fi
          git add _data/saves_inventory.json
          git commit -m "data: hydrate thread_replies into inventory"
          git push
